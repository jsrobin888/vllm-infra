---
# =============================================================================
# Role: monitoring_agents
# Phase 21: Prometheus Node/GPU Exporters + Promtail (Stages 146–152, 166–171)
# =============================================================================

# -- Stage 147: Node Exporter --
- name: "Stage 147 | Create node_exporter user"
  user:
    name: node_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: "Stage 147 | Download node_exporter"
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    mode: "0644"

- name: "Stage 147 | Extract node_exporter"
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: "Stage 147 | Install node_exporter binary"
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: "0755"
    remote_src: true

- name: "Stage 147 | Deploy node_exporter systemd service"
  copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network-online.target

      [Service]
      Type=simple
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter \
        --collector.filesystem.mount-points-exclude="^/(sys|proc|dev|host|etc)($$|/)" \
        --collector.systemd \
        --collector.processes \
        --web.listen-address=:9100
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
  notify:
    - reload systemd
    - restart node_exporter

# -- Stage 148: NVIDIA GPU Exporter (DCGM) --
- name: "Stage 148 | Run DCGM Exporter container"
  community.docker.docker_container:
    name: dcgm-exporter
    image: "nvcr.io/nvidia/k8s/dcgm-exporter:{{ dcgm_exporter_version | default('3.3.5-3.4.1') }}-ubuntu22.04"
    state: started
    restart_policy: unless-stopped
    runtime: nvidia
    env:
      DCGM_EXPORTER_LISTEN: ":9400"
      DCGM_EXPORTER_KUBERNETES: "false"
    published_ports:
      - "9400:9400"
    capabilities:
      - SYS_ADMIN
  when: "'gpu_runners' in group_names"

# -- Stage 167: Promtail agent --
- name: "Stage 167 | Create Promtail config directory"
  file:
    path: /etc/promtail
    state: directory
    mode: "0755"

- name: "Stage 167 | Deploy Promtail configuration"
  template:
    src: promtail.yml.j2
    dest: /etc/promtail/promtail.yml
    mode: "0644"

- name: "Stage 167 | Run Promtail container"
  community.docker.docker_container:
    name: promtail
    image: "grafana/promtail:{{ promtail_version }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - /etc/promtail:/etc/promtail:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/log/journal:/run/log/journal:ro
    command: "-config.file=/etc/promtail/promtail.yml"

# -- Enable services --
- name: "Enable node_exporter"
  systemd:
    name: node_exporter
    enabled: true
    state: started
    daemon_reload: true
