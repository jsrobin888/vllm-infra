---
# =============================================================================
# Role: nvidia_container_toolkit
# Phase 09: NVIDIA Container Toolkit (Stages 55–61)
# =============================================================================

# -- Stage 55: Repository setup --
- name: "Stage 55 | Add NVIDIA Container Toolkit GPG key"
  shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
      | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  args:
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: "Stage 55 | Add NVIDIA Container Toolkit repository"
  shell: |
    curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
      | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
      | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

- name: "Stage 55 | Update apt cache after adding repo"
  apt:
    update_cache: true

# -- Stage 56: Installation --
- name: "Stage 56 | Install NVIDIA Container Toolkit"
  apt:
    name: nvidia-container-toolkit
    state: present

# -- Stage 57: Docker runtime configuration --
- name: "Stage 57 | Configure NVIDIA runtime for Docker"
  command: nvidia-ctk runtime configure --runtime=docker
  notify: restart docker

# -- Stage 58: Default runtime (optional) --
- name: "Stage 58 | Set NVIDIA as default Docker runtime"
  lineinfile:
    path: /etc/docker/daemon.json
    regexp: '"default-runtime"'
    line: '  "default-runtime": "nvidia",'
    insertafter: "{"
  when: docker_default_runtime == "nvidia"
  notify: restart docker

# -- Stage 59: Verification --
- name: "Stage 59 | Verify GPU access in Docker container"
  command: >
    docker run --rm --gpus all
    nvidia/cuda:{{ cuda_version }}.0-base-ubuntu22.04
    nvidia-smi --query-gpu=name --format=csv,noheader
  register: docker_gpu_test
  changed_when: false
  retries: 3
  delay: 10

- name: "Stage 59 | Display Docker GPU test result"
  debug:
    msg: "GPUs accessible in Docker: {{ docker_gpu_test.stdout_lines }}"

# -- Stage 60: CDI configuration --
- name: "Stage 60 | Generate CDI specification"
  command: nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
  args:
    creates: /etc/cdi/nvidia.yaml
  ignore_errors: true

# -- Stage 61: GPU isolation test --
- name: "Stage 61 | Test single GPU isolation"
  command: >
    docker run --rm --gpus '"device=0"'
    nvidia/cuda:{{ cuda_version }}.0-base-ubuntu22.04
    nvidia-smi --query-gpu=name,index --format=csv,noheader
  register: gpu_isolation_test
  changed_when: false

- name: "Stage 61 | Verify GPU isolation"
  assert:
    that:
      - gpu_isolation_test.stdout_lines | length == 1
    success_msg: "GPU isolation working correctly — single GPU visible"
    fail_msg: "GPU isolation FAILED — expected 1 GPU but saw {{ gpu_isolation_test.stdout_lines | length }}"
