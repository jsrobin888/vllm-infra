---
# =============================================================================
# Role: docker_engine
# Phase 08: Docker Engine Installation (Stages 48–54)
# =============================================================================

# -- Stage 48: Docker repository --
- name: "Stage 48 | Add Docker GPG key"
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: "Stage 48 | Add Docker repository"
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
    update_cache: true

# -- Stage 49: Docker installation --
- name: "Stage 49 | Install Docker engine"
  apt:
    name:
      - "docker-ce"
      - "docker-ce-cli"
      - "containerd.io"
      - "docker-compose-plugin"
    state: present

- name: "Stage 49 | Hold Docker packages"
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - docker-ce
    - docker-ce-cli
    - containerd.io

# -- Stage 50–51: Docker daemon configuration --
- name: "Stage 50 | Create Docker data directory"
  file:
    path: "{{ docker_data_root }}"
    state: directory
    mode: "0710"

- name: "Stage 50 | Configure Docker daemon"
  copy:
    content: |
      {
        "data-root": "{{ docker_data_root }}",
        "storage-driver": "overlay2",
        "log-driver": "{{ docker_log_driver }}",
        "log-opts": {
          "max-size": "{{ docker_log_max_size }}",
          "max-file": "{{ docker_log_max_file }}",
          "tag": "{% raw %}{{.ImageName}}/{{.Name}}/{{.ID}}{% endraw %}"
        },
        "default-address-pools": [
          {
            "base": "172.17.0.0/12",
            "size": 24
          }
        ],
        "live-restore": true,
        "userland-proxy": false,
        "no-new-privileges": true,
        "default-ulimits": {
          "nofile": {
            "Name": "nofile",
            "Hard": 65536,
            "Soft": 65536
          },
          "memlock": {
            "Name": "memlock",
            "Hard": -1,
            "Soft": -1
          }
        },
        "metrics-addr": "0.0.0.0:9323",
        "experimental": true
      }
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: restart docker

# -- Stage 53: Docker user permissions --
- name: "Stage 53 | Add deploy user to docker group"
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# -- Stage 54: Docker systemd integration --
- name: "Stage 54 | Create Docker systemd override directory"
  file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: "0755"

- name: "Stage 54 | Configure Docker systemd overrides"
  copy:
    content: |
      [Service]
      # Increase default timeout for large image pulls
      TimeoutStartSec=300
      # Restart on failure
      Restart=on-failure
      RestartSec=10
      # Resource limits
      LimitNOFILE=infinity
      LimitNPROC=infinity
      LimitCORE=infinity
      # Memory accounting
      MemoryAccounting=true
      CPUAccounting=true
    dest: /etc/systemd/system/docker.service.d/override.conf
    mode: "0644"
  notify:
    - reload systemd
    - restart docker

# -- Stage 52: Docker cleanup cron --
- name: "Stage 52 | Docker system prune cron"
  cron:
    name: "Docker system prune"
    hour: "3"
    minute: "0"
    weekday: "0"
    job: "docker system prune -af --filter 'until=168h' >> /var/log/docker-prune.log 2>&1"
    user: root

- name: "Stage 54 | Enable Docker service"
  systemd:
    name: docker
    enabled: true
    state: started
    daemon_reload: true
