# Version Pinning Manifest — vLLM Infrastructure
# All versions are pinned for reproducibility across the fleet.
# Update versions here, then re-run the relevant Ansible playbooks.

# =============================================================================
# Operating System
# =============================================================================
ubuntu_version: "22.04.4"
kernel_version: "5.15.0-105-generic"          # HWE kernel, NVIDIA-compatible
kernel_package: "linux-image-5.15.0-105-generic"

# =============================================================================
# NVIDIA Stack
# =============================================================================
nvidia_driver_version: "550.90.07"
nvidia_driver_package: "nvidia-driver-550"
cuda_version: "12.4"
cuda_toolkit_package: "cuda-toolkit-12-4"
cudnn_version: "8.9.7"
nvidia_container_toolkit_version: "1.16.1"
nvidia_fabricmanager_version: "550.90.07"
nvidia_persistenced_version: "550.90.07"
dcgm_exporter_version: "3.3.5-3.4.1"

# =============================================================================
# Docker
# =============================================================================
docker_version: "27.1.1"
docker_compose_version: "2.29.1"
containerd_version: "1.7.20"

# =============================================================================
# vLLM
# =============================================================================
vllm_version: "0.8.3"
vllm_image: "vllm/vllm-openai"
vllm_image_tag: "v0.8.3"

# =============================================================================
# Python
# =============================================================================
python_version: "3.11.9"
python_package: "python3.11"
pip_version: "24.2"
huggingface_hub_version: "0.24.5"

# =============================================================================
# Monitoring Stack
# =============================================================================
prometheus_version: "2.54.0"
grafana_version: "11.1.3"
alertmanager_version: "0.27.0"
loki_version: "3.1.0"
promtail_version: "3.1.0"
node_exporter_version: "1.8.2"
cadvisor_version: "0.49.1"

# =============================================================================
# Load Balancer / Proxy
# =============================================================================
haproxy_version: "2.8.10"
nginx_version: "1.26.1"

# =============================================================================
# Security
# =============================================================================
vault_version: "1.17.2"
certbot_version: "2.11.0"
trivy_version: "0.54.1"
cosign_version: "2.3.0"
fail2ban_version: "1.0.2"

# =============================================================================
# Infrastructure Tools
# =============================================================================
ansible_version: "2.17.2"
terraform_version: "1.9.3"
packer_version: "1.11.1"

# =============================================================================
# NFS
# =============================================================================
nfs_utils_version: "1:2.6.1-1ubuntu1"         # Ubuntu 22.04 package version

# =============================================================================
# Tracing
# =============================================================================
jaeger_version: "1.60.0"
opentelemetry_collector_version: "0.107.0"

# =============================================================================
# Ray (Multi-node)
# =============================================================================
ray_version: "2.35.0"
