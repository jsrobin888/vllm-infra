# =============================================================================
# HAProxy Configuration — Phase 19: API Gateway & Load Balancing (Stages 133–140)
# =============================================================================

global
    log stdout format raw local0
    maxconn 4096
    daemon
    stats socket /var/run/haproxy.sock mode 660 level admin
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 10s
    timeout client  120s
    timeout server  600s            # Long timeout for LLM generation
    timeout http-keep-alive 60s
    timeout queue   300s
    retries 3
    option  redispatch

# =============================================================================
# Stage 133: Frontend — Client-facing endpoint
# =============================================================================
frontend vllm_frontend
    bind *:443 ssl crt /etc/haproxy/certs/vllm.pem alpn h2,http/1.1
    bind *:80
    redirect scheme https code 301 if !{ ssl_fc }

    # Stage 138: Rate limiting
    stick-table type ip size 100k expire 1m store http_req_rate(1m),conn_cur
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 600 }
    http-request deny deny_status 429 if { sc_conn_cur(0) gt 50 }

    # Stage 139: API key authentication
    http-request deny deny_status 401 unless { req.hdr(Authorization) -m found }

    # Stage 140: Route by model name in request body (best-effort)
    # Default backend
    default_backend vllm_default

    # Logging
    http-request set-header X-Request-ID %[uuid()]
    http-response set-header X-Request-ID %[req.hdr(X-Request-ID)]
    capture request header Authorization len 20

# =============================================================================
# Stage 134-135: Backend pools — per model
# =============================================================================

# Default pool — Llama 3.1 70B
backend vllm_default
    balance leastconn
    option httpchk GET /health
    http-check expect status 200

    # GPU Runner 01
    server gpu-runner-01 10.0.0.11:8000 check inter 10s fall 3 rise 2 maxconn 100 weight 100
    # GPU Runner 02
    server gpu-runner-02 10.0.0.12:8000 check inter 10s fall 3 rise 2 maxconn 100 weight 100
    # GPU Runner 03 (first model)
    server gpu-runner-03 10.0.0.13:8000 check inter 10s fall 3 rise 2 maxconn 150 weight 120

# Qwen pool
backend vllm_qwen
    balance leastconn
    option httpchk GET /health
    http-check expect status 200

    # GPU Runner 03 (second model)
    server gpu-runner-03-qwen 10.0.0.13:8001 check inter 10s fall 3 rise 2 maxconn 100 weight 100

# =============================================================================
# Stats & Admin
# =============================================================================
frontend stats
    bind *:9999
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:changeme
    stats admin if TRUE

# Health check endpoint for upstream LBs
frontend health
    bind *:8888
    mode http
    monitor-uri /healthz
